<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FF Giveaway Customer Support</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- NAME GATE -->
<div id="gate">
  <div class="logo-orb"></div>
  <h1>FF Giveaway Customer Support</h1>
  <p>Welcome! Enter your name to chat with our support team.</p>
  <input id="nameInput" type="text" placeholder="Your name" maxlength="24" autocomplete="off"/>
  <button id="enterBtn" disabled>Enter the room</button>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="avatar3d" id="adminAvatar"></div>
    <div class="info">
      <h2>FF Giveaway Support</h2>
      <span id="adminStatus" class="offline">offline — we'll reply soon</span>
    </div>
    <button class="icon-btn" id="voiceCallBtn" title="Voice call">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13 1 .34 1.99.62 2.94a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.14-1.14a2 2 0 0 1 2.11-.45c.95.28 1.94.49 2.94.62A2 2 0 0 1 22 16.92z"/></svg>
    </button>
    <button class="icon-btn" id="videoCallBtn" title="Video call">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    </button>
  </div>

  <div id="messages"></div>

  <div class="inputbar" id="inputbar">
    <button class="icon-btn" id="photoBtn" title="Send photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </button>
    <button class="icon-btn" id="cameraBtn" title="Take live photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
    <input type="text" id="textInput" placeholder="Type a message..." autocomplete="off"/>
    <div class="rec-indicator"><span class="rec-dot"></span> Recording voice message…</div>
    <input type="file" id="fileInput" accept="image/*">
    <button class="icon-btn" id="micBtn" title="Record voice message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/onboarding.js"></script>
<script>NebulaFlow.requireAuthed();</script>
<script src="/js/media.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
